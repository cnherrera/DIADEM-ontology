platforms:
  - acronym:      "REALCAT"
    title:        "REALCAT"
    description:  "REALCAT is a world-unique high-throughput screening platform dedicated to R&D in heterogeneous, homogeneous, and biocatalysis, as well as in ultra-innovative concepts such as hybrid and digital catalysis. Primarily focused on the development of sustainable processes for industrial biorefineries, REALCAT is supported by the Unit of Catalysis and Solid-State Chemistry (UCCS – UMR 8181), the Center for Research in Computer Science, Signal and Automation of Lille (CRIStAL – UMR 9189), and the Charles Viollette Institute (ICV – cross-border UMR 1158 BioEcoAgro)."
    goal_description: "REALCAT offers extensive expertise in the field of catalytic materials, which are at the heart of major societal challenges and represent a key response to today’s pressing concerns (energy, health, food, environment, etc.)."
    goal_category: "synthesis"   # synthesis | characterization |  infrastructure
    lead_projects:                    # 1 or 2 project acronyms (must exist in projects files)
      - "DREAM-BIO"
    contacts:
      - manager:  "Sebastien PAUL"
    location:   "Centrale Lille, Cité Scientifique – CS20048 59651 Villeneuve d’Ascq Cedex FRANCE"
    material: 
      - "Polymers"
      - "Metals"
      - "Ceramics"
      - "MOFs"
    dimensions: 
      - "0D"


  - acronym:      "SCIENCEPLAT"
    title:        "Core Science Platform"
    description:  "Platform for fundamental research activities."
    goal_description: "Advance core scientific knowledge in the program's domain."
    goal_category: "scientific"
    lead_projects:
      - "MYPROJECT"

